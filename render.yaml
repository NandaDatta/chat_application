services:
  - type: web
    name: chat-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18

  - type: web
    name: chat-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l 10000
    envVars:
      - key: NODE_VERSION
        value: 18